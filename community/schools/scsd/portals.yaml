# ─── Grade / Attendance Portal ───────────────────────────────────────────────
grades_portal:
  system: PowerSchool
  login_url: https://scsdk8.powerschool.com/public/home.html
  auth_type: username_password        # no SSO — district-issued credentials
  api_available: true
  api_library: PyPowerSchool          # github.com/dougpenny/PyPowerSchool
  api_library_url: https://github.com/dougpenny/PyPowerSchool
  automation_tier: 2                  # Playwright persistent profile (or API)
  credential_keychain_service: scsd-powerschool
  notes: >
    Use PyPowerSchool for API access with district-provided parent credentials.
    Browser fallback: Tier 2 (save session once, replay headlessly).
    No Google SSO — uses native PowerSchool login.

# ─── Learning Management System ──────────────────────────────────────────────
lms:
  system: Google Classroom
  login_url: https://classroom.google.com/
  auth_type: google_oauth             # SSO via @scsdk8.org Google accounts
  api_available: true
  api_library: google-api-python-client
  api_scope: https://www.googleapis.com/auth/classroom.courses.readonly
  observer_role: true                 # parents can be added as guardians
  guardian_invite: contact teacher or school office
  automation_tier: 1                  # attach to existing Chrome (Google SSO)
  notes: >
    SCSD uses Google Workspace (@scsdk8.org). Students log in with Google SSO.
    Parents access via Guardian summary emails (daily/weekly digest via Google Classroom settings).
    For API access: request guardian invite from teacher, then use Classroom API
    with guardian credentials. See automation/school-portals/google-classroom.py.

# ─── Lunch Account ────────────────────────────────────────────────────────────
lunch:
  system: unknown                     # NOT confirmed as of 2026-03-31
  notes: >
    SCSD lunch payment system not confirmed via public website.
    Contact Business Office to verify (see district website for current contact).
    Likely candidates: MySchoolBucks or district-managed system.
    Update this field once confirmed.
  district_lunch_page: https://www.scsdk8.org/apps/pages/School-Lunch-Program
  menus_distribution: school newsletters (no dedicated menu app confirmed)

