# ─── Aggregation settings ────────────────────────────────────────────────────
aggregator:
  dedup_threshold: 0.6
  recency_window_days: 7
  top_n: 20
  score_weights:
    relevance: 5
    recency: 3
    actionability: 3      # has date, location, registration link
    cross_source: 2       # mentioned in 2+ sources

# ─── Topic-specific source presets ──────────────────────────────────────────
# Use these when running /info-gather with a specific topic:
presets:
  events_this_weekend:
    description: "What's happening this weekend for kids"
    sources: [smcl_san_carlos_events, sancarloslife, chatterblock_sancarlos,
              eventbrite_sancarlos_kids, sancarlos_parks_events, scct_calendar]

  summer_camps:
    description: "Summer camp research"
    sources: [kidsoutandabout_camps, camppage_peninsula, chatterblock_sancarlos_resources,
              sancarlos_activenet, sancarlos_childrens_theater, kings_swim_sancarlos]

  school_news:
    description: "School and district announcements"
    sources: [scsd_district_news]   # + enable your specific school's feed in scsd/portals.yaml

  sports_registration:
    description: "Youth sports registration openings"
    sources: [ayso_sancarlos, sancarlos_little_league, sancarlos_activenet,
              sancarlos_youth_sports, sancarlos_united_soccer]

  enrichment_classes:
    description: "After-school classes and enrichment programs"
    sources: [chatterblock_sancarlos_resources, sancarlos_childrens_theater,
              kings_swim_sancarlos, sancarlos_activenet]

  community_news:
    description: "Local San Carlos community news and discussions"
    sources: [sancarloslife, patch_sancarlos, reddit_sancarlos, smdailyjournal]
