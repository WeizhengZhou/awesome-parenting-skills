# San Carlos, CA — Parenting Information Sources
# City: San Carlos, CA | County: San Mateo | Schools: SCSD (TK-8), SUHSD/Carlmont (9-12)
# Last verified: 2026-03-31
#
# Use with: /info-gather [topic] --sources community/regions/bay-area/san-carlos/sources.yaml
# For school portals: see community/schools/scsd/portals.yaml
#                     see community/schools/suhsd-carlmont/portals.yaml

city: San Carlos
state: CA
county: San Mateo
zip_codes: ["94070"]

# ─── School District News ────────────────────────────────────────────────────
sources:

  scsd_district_news:
    label: "SCSD District News"
    url: https://www.scsdk8.org/apps/news/rss?categoryid=9525
    type: rss
    rate_limit: 1.0
    needs_browser: false
    enabled: true
    max_items: 10
    tags: [school, district, news]
    notes: "SCSD district-level RSS (Edlio platform). Enable per-school feeds in scsd/portals.yaml"

  # ─── Library ────────────────────────────────────────────────────────────────

  smcl_san_carlos_events:
    label: "San Carlos Library Events (SMCL)"
    url: https://smcl.bibliocommons.com/v2/events?locations=1S
    type: browser
    rate_limit: 2.0
    needs_browser: true                # BiblioCommons requires JS
    enabled: true
    max_items: 20
    tags: [library, events, storytime, kids]
    notes: >
      San Carlos branch (location code 1S) of San Mateo County Library.
      No RSS/iCal. Requires JS rendering. Filter by age group on the page.
      Recurring: Family Storytime Thu 10:30 AM, Baby Bounce Fri 10:30 AM.

  smcl_all_events:
    label: "SMCL All Branch Events"
    url: https://smcl.bibliocommons.com/v2/events
    type: browser
    rate_limit: 2.0
    needs_browser: true
    enabled: false   # use san_carlos_events (location-filtered) instead
    keywords: [kids, children, family, storytime, toddler, youth, teen]
    max_items: 15
    tags: [library, events]

  # ─── Parks & Recreation ────────────────────────────────────────────────────

  sancarlos_activenet:
    label: "San Carlos Parks & Rec Registration (ActiveNet)"
    url: https://anc.apm.activecommunities.com/sancarlos/home
    type: browser
    rate_limit: 3.0
    needs_browser: true
    enabled: true
    max_items: 20
    tags: [recreation, registration, classes, camps, sports]
    notes: >
      City of San Carlos uses ActiveNet (Active Network) for all Parks & Rec registration.
      No RSS/API. Monitor for class openings via /monitor-registration.
      Activity guides (seasonal PDF): https://www.cityofsancarlos.org/activityguide/

  sancarlos_parks_events:
    label: "San Carlos Community Events (City)"
    url: https://www.cityofsancarlos.org/city_hall/departments_and_divisions/parks_and_recreation/community_events.php
    type: browser
    rate_limit: 2.0
    needs_browser: false
    enabled: true
    max_items: 10
    tags: [city, events, community, family]
    notes: "City-run community events page. No RSS — use changedetection.io or web_search fallback."

  sancarlos_youth_sports:
    label: "San Carlos Youth Sports (City)"
    url: https://www.cityofsancarlos.org/city_hall/departments_and_divisions/parks_and_recreation/youth/index.php
    type: browser
    rate_limit: 2.0
    needs_browser: false
    enabled: true
    max_items: 10
    tags: [sports, youth, registration]

